<!doctype html>
<html>
  <head>
    <title>Smart BMI Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h1>BMI Calculator</h1>

      <label>Weight (in kg):</label><br />
      <input type="number" id="weight" placeholder="e.g. 70" /><br /><br />

      <label>Height (in meters):</label><br />
      <input type="number" id="height" placeholder="e.g. 1.75" /><br /><br />

      <button onclick="calculateBMI()">Calculate</button>

      <h2 id="result">Your result will appear here</h2>
    </div>

    <script src="script.js"></script>
  </body>
</html>
